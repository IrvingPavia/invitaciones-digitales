server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml font/woff2;

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }

    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
        proxy_set_header Host $host;
        client_max_body_size 50m;
        # Cache uploaded files (images, gifs, audio) on client
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        # Detect social media bots and serve OG meta tags
        set $is_bot 0;
        if ($http_user_agent ~* "facebookexternalhit|Facebot|Twitterbot|WhatsApp|LinkedInBot|Slackbot|TelegramBot|Pinterest|Discordbot") {
            set $is_bot 1;
        }

        # Redirect bots to OG endpoint for /invitacion/{slug} paths
        if ($is_bot) {
            rewrite ^/invitacion/(.+)$ /api/public/og/$1 last;
        }

        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images and media — long cache
    location ~* \.(png|jpg|jpeg|gif|webp|svg|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
