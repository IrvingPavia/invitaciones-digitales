version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: invitaciones-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-invitaciones}
      MYSQL_USER: ${DB_USER:-invitaciones_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-invitaciones_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - invitaciones-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invitaciones-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: 24h
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-invitaciones}
      DB_USER: ${DB_USER:-invitaciones_user}
      DB_PASSWORD: ${DB_PASSWORD:-invitaciones_pass}
      BASE_URL: ${BASE_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - invitaciones-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invitaciones-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - invitaciones-net

volumes:
  mysql_data:
  backend_uploads:

networks:
  invitaciones-net:
    driver: bridge
